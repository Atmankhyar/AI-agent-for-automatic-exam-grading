version: "3.9"

services:
  api:
    build: ./backend
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ./backend/app:/app/app
      - ./storage:/app/storage

  worker:
    build: ./backend
    env_file: ./backend/.env
    command: ["celery", "-A", "worker.celery_app:app", "worker", "--loglevel=info"]
    depends_on:
      - redis
      - db
    volumes:
      - ./backend/app:/app/app
      - ./storage:/app/storage

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-exam}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-exam}
      POSTGRES_DB: ${DB_NAME:-exam}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
